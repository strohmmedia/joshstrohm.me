name: AI Blog Post

on:
  schedule:
    # Runs every day at 09:00 UTC (adjust as needed)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Generate blog post
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/ai-blog-gha.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add: AI generated blog post"
          branch: ai-blog/auto-${{ github.run_id }}
          title: "🤖 AI Blog Post - ${{ github.run_number }}"
          body: |
            This PR contains an AI-generated blog post.
            - Netlify will deploy a preview on merge.
            - Please review before merging to main.
          labels: automated
