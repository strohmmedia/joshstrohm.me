name: AI Blog Post

on:
  schedule:
    # Runs every day at 09:00 UTC (adjust freely)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write   # allow push to main

jobs:
  create-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Generate blog post
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/ai-blog-gha.py

      - name: Configure git
        run: |
          git config user.name "AI Blog Bot"
          git config user.email "ai-blog@hermes.agent"

      - name: Push to main
        run: |
          git checkout main || git checkout -b main
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🤖 AI Blog - $(date -I)" || echo "Nothing to commit"
          git push origin main
